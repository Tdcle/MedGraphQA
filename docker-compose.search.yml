services:
  postgres:
    image: postgres:16
    container_name: medgraphqa-postgres
    environment:
      POSTGRES_DB: medgraphqa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - medgraphqa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medgraphqa"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    build:
      context: .
      dockerfile: docker/elasticsearch/Dockerfile
      args:
        ELASTIC_VERSION: 8.17.2
    image: medgraphqa-elasticsearch-ik:8.17.2
    container_name: medgraphqa-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - medgraphqa_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.2
    container_name: medgraphqa-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  medgraphqa_postgres_data:
  medgraphqa_elasticsearch_data:
